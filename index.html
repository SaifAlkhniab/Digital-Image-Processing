<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title-tag">Digital Image Processing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <button onclick="setLanguage('en')">English</button>
            <button onclick="setLanguage('ar')">العربية</button>
        </div>

        <h1 id="main-title">Digital Image Processing</h1>
        
        <section class="setup-section">
            <h2 id="h-setup">1. Image Matrix (10x10)</h2>
            <div class="matrix-scroll-wrapper">
                <div id="matrix-10-container" class="grid-10-with-labels"></div>
            </div>
            <div class="matrix-btns">
                <button id="btn-random" onclick="fillRandom()">Fill Random Values</button>
                <button id="btn-100" onclick="fill1to100()">Fill 1-100</button>
            </div>
        </section>

        <section class="distance-section">
            <h2 id="h-distance">2. Distance Calculator</h2>
            <div class="calc-inputs">
                <div class="point-group">
                    <span>P(x,y):</span>
                    <input type="number" id="px" value="2" min="0" max="9" onchange="highlightNeighbors()">
                    <input type="number" id="py" value="2" min="0" max="9" onchange="highlightNeighbors()">
                </div>
                <div class="point-group">
                    <span>Q(x,y):</span>
                    <input type="number" id="qx" value="4" min="0" max="9">
                    <input type="number" id="qy" value="4" min="0" max="9">
                </div>
                <button id="btn-calc" onclick="calculateDistances()">Calculate</button>
            </div>
            <div id="results" class="results-box">
                <p id="label-city">City-block (D4): <span id="res-city">--</span></p>
                <p id="label-chess">Chessboard (D8): <span id="res-chess">--</span></p>
                <p id="label-eucl">Euclidean (De): <span id="res-eucl">--</span></p>
            </div>
        </section>

        <section class="neighbors-section">
            <h2 id="h-neighbors">3. Neighbors Analysis</h2>
            <p id="neighbor-desc">Select a type to see neighbors of Point P.</p>
            <div class="neighbor-controls">
                <button onclick="highlightNeighbors(4)">4-Neighbors (A)</button>
                <button onclick="highlightNeighbors('diag')">Diagonal (B)</button>
                <button onclick="highlightNeighbors(8)">8-Neighbors (C)</button>
                <button class="reset-btn" onclick="clearHighlights()">Clear</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
